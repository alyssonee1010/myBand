<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>MyBand Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: #050505;
        color: #f7f3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 153, 51, 0.34), transparent 32rem),
          linear-gradient(160deg, #050505 0%, #18110d 52%, #2d1604 100%);
        padding: 24px;
      }

      main {
        width: min(100%, 540px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        padding: 32px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      }

      p {
        margin: 0;
      }

      .kicker {
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.68);
      }

      .title {
        margin-top: 20px;
        font-size: clamp(2rem, 7vw, 3.5rem);
        font-weight: 700;
        line-height: 1;
      }

      .body {
        margin-top: 20px;
        font-size: 1rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.8);
      }

      .accent {
        color: #ff9a3c;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Offline</p>
      <p class="title">MyBand is <span class="accent">offline</span>.</p>
      <p class="body">
        Reconnect to keep opening band pages, PDFs, and setlists. Once you are back online,
        relaunch MyBand and everything will be ready again.
      </p>
    </main>
  </body>
</html>
